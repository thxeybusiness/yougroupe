<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>you'groupe</title>
  <meta name="description" content="you'groupe" />
  <style>
    :root {
      --bg: #0b0b0f;
      --fg: #f5f5f7;
      --muted: #9a9aa6;
      --accent: #6d5efc;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7fb;
        --fg: #14141a;
        --muted: #6b6b78;
        --accent: #5b4bf0;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(1200px 600px at 50% -10%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 60%),
        var(--bg);
      text-align: center;
    }
    main { max-width: 640px; }
    .logo {
      font-size: clamp(2.75rem, 12vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin: 0;
    }
    .logo .apos { color: var(--accent); }
    .tagline {
      margin: 20px 0 0;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      color: var(--muted);
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-top: 40px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 24px 2px color-mix(in srgb, var(--accent) 70%, transparent);
    }
  </style>
</head>
<body>
  <main>
    <h1 class="logo">you<span class="apos">'</span>groupe</h1>
    <p class="tagline">Bientôt disponible.</p>
    <div class="dot" aria-hidden="true"></div>
  </main>
</body>
</html>
